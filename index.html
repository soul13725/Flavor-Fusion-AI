<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flavor Fusion AI</title>
  <meta name="description" content="AI-powered culinary and mixology assistant — runs entirely in your browser." />

  <!-- stlite styles -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.css"
  />

  <style>
    /* ── Reset & Full-Height Layout ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f23;
      color: #e2e2f0;
    }

    /* ── Loading Screen ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f23 0%, #16213e 50%, #0d3b66 100%);
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loader-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .loader-subtitle {
      font-size: 0.95rem;
      color: #8888aa;
      margin-bottom: 2rem;
    }
    .loader-bar-wrap {
      width: 320px;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #e040fb);
      border-radius: 3px;
      animation: loading-bar 4s ease-in-out forwards;
    }
    .loader-status {
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #6666aa;
      height: 1.2em;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }
    @keyframes loading-bar {
      0%   { width: 0%; }
      20%  { width: 25%; }
      50%  { width: 55%; }
      80%  { width: 80%; }
      100% { width: 98%; }
    }

    /* ── App Container ── */
    #root {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- Loading splash screen -->
  <div id="loading-screen">
    <div class="loader-logo">🍽️</div>
    <div class="loader-title">Flavor Fusion AI</div>
    <div class="loader-subtitle">Your AI-powered culinary &amp; mixology assistant</div>
    <div class="loader-bar-wrap">
      <div class="loader-bar"></div>
    </div>
    <div class="loader-status" id="loader-status">Initialising Python runtime…</div>
  </div>

  <!-- stlite mount target -->
  <div id="root"></div>

  <!-- stlite/mountable — runs Streamlit fully in the browser via WebAssembly -->
  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.63.0/build/stlite.js"></script>

  <script>
    // ── Status messages during load ──────────────────────────────────────────
    const statusEl = document.getElementById("loader-status");
    const messages = [
      "Initialising Python runtime…",
      "Loading WebAssembly modules…",
      "Installing packages…",
      "Mounting Streamlit app…",
      "Warming up the kitchen…",
    ];
    let msgIdx = 0;
    const msgTimer = setInterval(() => {
      msgIdx = (msgIdx + 1) % messages.length;
      if (statusEl) statusEl.textContent = messages[msgIdx];
    }, 1800);

    // ── Mount the Streamlit app ──────────────────────────────────────────────
    stlite.mount(
      {
        // Python packages to install from PyPI via micropip
        requirements: [
          "pandas",
          "thefuzz",
          "python-Levenshtein",
          "pydantic",
          "openai",
          "python-dotenv",
          "aiohttp",
          "streamlit",
        ],

        // Entry point
        entrypoint: "app.py",

        // Map every project file so stlite can serve them from the static bundle.
        // Each `url` is relative to the index.html — Vercel serves these as
        // static assets with the COEP/COOP headers set in vercel.json.
        files: {
          "app.py":         { url: "./app.py" },
          "config.py":      { url: "./config.py" },
          "database.py":    { url: "./database.py" },
          "engine.py":      { url: "./engine.py" },
          "models.py":      { url: "./models.py" },
          "nutrition.py":   { url: "./nutrition.py" },
          "prompts.py":     { url: "./prompts.py" },
          "retrieval.py":   { url: "./retrieval.py" },
          "translation.py": { url: "./translation.py" },
          "__init__.py":    { url: "./__init__.py" },

          // CSV datasets — served as static files, fetched into the WASM FS
          "data/indian_recipes.csv":    { url: "./data/indian_recipes.csv" },
          "data/global_recipes.csv":    { url: "./data/global_recipes.csv" },
          "data/beverages.csv":         { url: "./data/beverages.csv" },
          "data/nutrition_database.csv":{ url: "./data/nutrition_database.csv" },
        },
      },
      document.getElementById("root"),
    );

    // ── Hide loading screen once stlite fires its first render ──────────────
    // stlite dispatches a custom "streamlit:componentReady" event on the window.
    // We also poll the DOM as a reliable fallback.
    function hideLoader() {
      clearInterval(msgTimer);
      const screen = document.getElementById("loading-screen");
      if (screen) screen.classList.add("hidden");
      setTimeout(() => { if (screen) screen.remove(); }, 700);
    }

    window.addEventListener("streamlit:componentReady", hideLoader, { once: true });

    // Fallback: hide after 12 s even if the event never fires
    const fallbackTimer = setTimeout(hideLoader, 12000);

    // Also watch for the stlite iframe or app container to become visible
    const observer = new MutationObserver(() => {
      const appFrame = document.querySelector("#root iframe, #root .stApp");
      if (appFrame) {
        clearTimeout(fallbackTimer);
        hideLoader();
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById("root"), {
      childList: true,
      subtree: true,
    });
  </script>

</body>
</html>
